<nz-card
    class="book-card"
    nzHoverable
    [nzBodyStyle]="{ height: '100%', display: 'flex', flexDirection: 'column' }"
    (click)="clicked.emit()"
>
    <div class="book-card__content">
        <h3
            class="book-card__title"
            nz-typography
        >
            {{ book().title }}
        </h3>
        <p
            class="book-card__author"
            nz-typography
            nzType="secondary"
        >
            {{ book().author }}
        </p>
        <nz-tag [nzColor]="statusColor(book().status)">
            {{ statusLabel(book().status) }}
        </nz-tag>
    </div>

    <div class="book-card__actions">
        <button
            nz-button
            nzSize="small"
            [disabled]="isUpdating() || isDeleting()"
            (click)="$event.stopPropagation(); statusClicked.emit(book())"
            i18n
        >
            Сменить статус
        </button>
        <button
            nz-button
            nzDanger
            nzSize="small"
            [disabled]="isUpdating() || isDeleting()"
            (click)="$event.stopPropagation(); deleteClicked.emit(book())"
        >
            @if (isDeleting()) {
                <span i18n>Удаляем...</span>
            } @else {
                <span i18n>Удалить</span>
            }
        </button>
    </div>
</nz-card>
