<main class="main">
    <book-filters
        [selectedStatus]="selectedStatus()"
        [searchQuery]="searchQuery()"
        [sorted]="sortOrder()"
        (statusSelected)="handleChangeStatus($event)"
        (searchChanged)="handleChangeSearch($event)"
        (sortedChanged)="handleChangeSortOrder($event)"
    />
    @if (booksService.actionError()) {
        <p class="error">{{ booksService.actionError() }}</p>
    }

    <book-list
        [books]="booksService.books()"
        [selectedStatus]="selectedStatus()"
        [searchQuery]="searchQuery()"
        [sortOrder]="sortOrder()"
        [isLoading]="booksService.loadingBooks()"
        [loadError]="booksService.loadBooksError()"
        [updatingBookIds]="booksService.updatingBookIds()"
        [deletingBookIds]="booksService.deletingBookIds()"
        (clicked)="handleBookClick($event)"
        (statusClicked)="changeBookStatus($event)"
        (deleteClicked)="deleteBook($event)"
    />

    <button
        class="book-create-button"
        [disabled]="booksService.creatingBook()"
        (click)="openCreateBookModal()"
    >
        Создать запись
    </button>
    <app-book-creator-component
        [isOpen]="isCreateBookModalOpen()"
        [isSubmitting]="booksService.creatingBook()"
        (close)="closeCreateBookModal()"
        (submitBook)="onSubmitBookModal($event)"
    />
</main>
